<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>客户案例 | 淮安新红门业有限公司</title>
    <meta
      name="description"
      content="淮安新红门业有限公司客户案例展示，涵盖工厂园区、学校单位、社区物业和商业配套出入口项目。"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="nav-wrap">
          <a class="brand" href="./index.html" aria-label="返回首页">
            <span class="brand-mark" aria-hidden="true"><img src="./favicon.svg" alt="" /></span>
            <span class="brand-copy">
              <strong data-field="company-short"></strong>
              <small>Huai'an Local Entrance Solutions</small>
            </span>
          </a>
          <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">菜单</button>
          <nav id="site-nav" class="site-nav" aria-label="主导航">
            <a href="./index.html">首页</a>
            <a href="./product-center.html">产品方案</a>
            <a class="is-current" href="./cases.html">客户案例</a>
            <a class="nav-cta" href="./contact.html">联系方式</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="page-hero section">
          <div class="breadcrumbs" data-reveal>
            <a href="./index.html">首页</a>
            <span>/</span>
            <span>客户案例</span>
          </div>
          <div class="page-hero-shell">
            <div class="page-copy page-copy-compact" data-reveal>
              <p class="eyebrow">客户案例</p>
              <h1>看几类现场项目。</h1>
              <p>先看是不是接近的客户类型。</p>
            </div>
            <div class="page-hero-actions" data-reveal>
              <a class="button button-primary" href="./contact.html">电话联系</a>
              <a class="button button-secondary" href="./product-center.html">看产品方案</a>
            </div>
          </div>
        </section>

        <section class="section cases">
          <div class="case-grid">
            <article class="case-card" data-reveal>
              <div class="case-visual">
                <img class="placeholder-image" src="./assets/placeholders/page-home-case-factory.svg" alt="" width="1200" height="800" loading="lazy" />
                <span>工厂园区</span>
              </div>
              <div class="case-body">
                <p class="card-label">客户案例</p>
                <h3>某制造企业总部</h3>
                <a href="./contact.html">看类似项目</a>
              </div>
            </article>
            <article class="case-card" data-reveal>
              <div class="case-visual case-visual-alt">
                <img class="placeholder-image" src="./assets/placeholders/page-home-case-campus.svg" alt="" width="1200" height="800" loading="lazy" />
                <span>学校单位</span>
              </div>
              <div class="case-body">
                <p class="card-label">客户案例</p>
                <h3>某学校单位西门</h3>
                <a href="./contact.html">看类似项目</a>
              </div>
            </article>
            <article class="case-card" data-reveal>
              <div class="case-visual case-visual-warm">
                <img class="placeholder-image" src="./assets/placeholders/page-home-case-community.svg" alt="" width="1200" height="800" loading="lazy" />
                <span>社区物业</span>
              </div>
              <div class="case-body">
                <p class="card-label">客户案例</p>
                <h3>某社区主入口</h3>
                <a href="./contact.html">看类似项目</a>
              </div>
            </article>
          </div>
          <div class="section-actions">
            <a class="button button-primary" href="./contact.html">先沟通项目需求</a>
            <a class="button button-secondary" href="./product-center.html">看产品方案</a>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p><span data-field="company"></span> | 红门授权经销商 | 出入口设备与系统</p>
        <p>© <span data-field="year"></span> All rights reserved.</p>
      </footer>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
